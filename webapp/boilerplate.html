<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[MODULETITEL]</title>
<link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFF8F2;--fg:#27292D;--amber:#FF8514;--flame:#FF4D00;--gold:#FFD964;--peach:#FFD7AD;--cream:#F7E6C2;--gradient:linear-gradient(90deg,#FF8514,#FF4D00);--gradient-warm:linear-gradient(90deg,#FFD964,#FF8514,#FF4D00);--font-h:'Arimo',Arial,sans-serif;--font-b:'Montserrat',sans-serif;--radius:12px;--radius-pill:50px;}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);font-size:1rem;line-height:1.6;margin:0;}
header{position:sticky;top:0;z-index:100;background:var(--fg);border-bottom:1px solid rgba(255,248,242,0.1);padding:0.75rem 1.5rem 0;}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:860px;margin:0 auto;}
.logo{font-family:var(--font-h);font-weight:700;font-size:1.25rem;color:var(--bg);text-decoration:none;}
.header-title{font-family:var(--font-h);font-size:0.85rem;font-weight:700;color:var(--bg);opacity:0.8;text-align:center;}
.header-back{font-size:0.8rem;color:var(--bg);text-decoration:none;font-weight:600;opacity:0.7;}
.screen{display:none;max-width:860px;margin:2rem auto;padding:0 1.5rem 4rem;}
.screen.start{display:block;}
.btn{display:inline-block;background:var(--gradient);color:var(--bg);font-family:var(--font-b);font-weight:700;font-size:0.95rem;padding:0.8rem 2rem;border-radius:var(--radius-pill);border:none;cursor:pointer;text-decoration:none;transition:opacity 0.2s,transform 0.1s;}
.btn:hover{opacity:0.9;transform:translateY(-1px);}
.btn-outline{background:transparent;border:2px solid var(--fg);color:var(--fg);}
.btn-outline:hover{background:var(--fg);color:var(--bg);opacity:1;}
.btn-wrap{display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1.5rem;}
.welcome-hero{background:var(--fg);color:var(--bg);border-radius:var(--radius);padding:2.5rem;margin-bottom:2rem;position:relative;overflow:hidden;}
.welcome-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:260px;height:260px;background:radial-gradient(circle,rgba(255,133,20,0.35) 0%,transparent 70%);border-radius:50%;}
.welcome-hero::after{content:'';position:absolute;bottom:-60px;left:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(255,77,0,0.2) 0%,transparent 70%);border-radius:50%;}
.welcome-hero h1{font-family:var(--font-h);font-size:2.2rem;margin-bottom:0.75rem;position:relative;}
.welcome-hero p{color:rgba(255,248,242,0.85);font-size:1.05rem;position:relative;}
.welcome-badge{display:inline-block;background:rgba(255,248,242,0.15);color:var(--gold);font-family:var(--font-h);font-weight:700;font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;padding:0.25rem 0.8rem;border-radius:var(--radius-pill);margin-bottom:1rem;position:relative;}
.leerdoelen{background:var(--bg);border:1px solid var(--peach);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;}
.leerdoelen h3{font-family:var(--font-h);font-size:1rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber);margin-bottom:1rem;}
.leerdoelen ul{list-style:none;padding:0;margin:0;}
.leerdoelen li{padding:0.5rem 0 0.5rem 1.75rem;position:relative;border-bottom:1px solid var(--cream);font-size:0.95rem;}
.leerdoelen li:last-child{border-bottom:none;}
.leerdoelen li::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:12px;height:12px;background:var(--gradient);border-radius:50%;}
.tijdsbadge{display:inline-flex;align-items:center;gap:0.4rem;background:var(--cream);color:var(--fg);font-size:0.85rem;font-weight:600;padding:0.35rem 0.9rem;border-radius:var(--radius-pill);margin-bottom:1.5rem;}
.module-header{background:var(--fg);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.5rem;}
.module-header .module-num{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--gold);margin-bottom:0.25rem;}
.module-header h2{font-family:var(--font-h);font-size:1.5rem;color:var(--bg);margin:0;}
.content-card{background:var(--bg);border:1px solid var(--peach);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;}
.content-card p{margin-bottom:0.75rem;}
.content-card p:last-child{margin-bottom:0;}
.correct{background:rgba(34,197,94,0.15)!important;border-color:#22c55e!important;}
.fout{background:rgba(239,68,68,0.15)!important;border-color:#ef4444!important;}
.kennischeck{background:var(--fg);color:var(--bg);border-radius:var(--radius);padding:1.75rem;margin-bottom:1.5rem;}
.kennischeck h3{font-family:var(--font-h);font-size:1rem;color:var(--gold);margin-bottom:1rem;}
.kennischeck .kc-vraag{font-size:1rem;margin-bottom:1.25rem;}
.kc-opties{display:flex;flex-direction:column;gap:0.5rem;}
.kc-optie{background:rgba(255,248,242,0.1);border:1px solid rgba(255,248,242,0.2);border-radius:8px;padding:0.75rem 1rem;cursor:pointer;color:var(--bg);font-family:var(--font-b);font-size:0.95rem;text-align:left;transition:all 0.2s;}
.kc-optie:hover{background:rgba(255,133,20,0.25);border-color:var(--amber);}
.kc-feedback{margin-top:0.75rem;padding:0.75rem 1rem;border-radius:8px;font-size:0.9rem;display:none;}
.kc-feedback.correct{display:block;color:#16a34a;background:rgba(34,197,94,0.12);border:1px solid #22c55e;}
.kc-feedback.fout{display:block;color:#dc2626;background:rgba(239,68,68,0.12);border:1px solid #ef4444;}
.kc-knoppen{display:flex;gap:0.5rem;flex-wrap:wrap;margin-top:0.75rem;}
.flashcard-set{display:flex;flex-wrap:wrap;gap:0.75rem;margin:1.25rem 0;align-items:flex-start;}
.flashcard{background:var(--fg);color:var(--bg);border-radius:var(--radius);padding:1rem 1.25rem;cursor:pointer;flex:1 1 240px;min-width:240px;transition:all 0.2s;border:2px solid transparent;}
.flashcard:hover{border-color:var(--amber);}
.flashcard .fc-term{font-family:var(--font-h);font-size:0.9rem;font-weight:700;color:rgba(255,248,242,0.95);margin-bottom:0.5rem;}
.flashcard .fc-uitleg{font-size:0.85rem;color:rgba(255,248,242,0.85);display:none;line-height:1.5;}
.flashcard.open .fc-uitleg{display:block;}
.flashcard .fc-hint{font-size:0.75rem;color:var(--amber);margin-top:0.5rem;}
.flashcard.open .fc-hint{display:none;}
.invul-wrap{margin:1.25rem 0;}
.invul-zin{font-size:1rem;line-height:2;}
.invul-input{border:none;border-bottom:2px solid var(--amber);background:transparent;font-family:var(--font-b);font-size:1rem;color:var(--fg);padding:0 0.25rem;width:140px;outline:none;}
.invul-input.correct-input{border-color:#22c55e;color:#16a34a;}
.invul-input.fout-input{border-color:#ef4444;color:#dc2626;}
.invul-feedback{font-size:0.85rem;margin-top:0.5rem;min-height:1.2rem;}
.diagram-wrap{position:relative;margin:1.25rem 0;}
.diagram-svg-container{position:relative;}
.diagram-hotspot{position:absolute;width:28px;height:28px;background:var(--gradient);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:0.75rem;font-weight:700;color:white;transition:transform 0.2s;z-index:10;}
.diagram-hotspot:hover{transform:scale(1.2);}
.diagram-popup{display:none;position:absolute;background:var(--fg);color:var(--bg);border-radius:var(--radius);padding:0.75rem 1rem;font-size:0.85rem;max-width:220px;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.2);}
.diagram-popup.zichtbaar{display:block;}
.diagram-popup .popup-titel{font-family:var(--font-h);font-weight:700;color:var(--gold);margin-bottom:0.35rem;font-size:0.9rem;}
.stappen-lijst{margin:1.25rem 0;}
.stap-item{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1rem;padding:1rem;background:var(--bg);border:1px solid var(--peach);border-radius:var(--radius);}
.stap-nummer{flex-shrink:0;width:36px;height:36px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-weight:700;color:var(--bg);font-size:0.9rem;}
.stap-content h4{font-family:var(--font-h);font-size:1rem;margin:0 0 0.25rem;}
.stap-content p{margin:0;font-size:0.9rem;}
.tip-box{border-left:4px solid var(--amber);background:rgba(255,215,173,0.25);border-radius:0 var(--radius) var(--radius) 0;padding:1rem 1.25rem;margin:1.25rem 0;}
.tip-box.waarschuwing{border-left-color:#ef4444;background:rgba(239,68,68,0.08);}
.tip-box-label{font-family:var(--font-h);font-weight:700;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:0.35rem;}
.tip-box-label.tip{color:var(--amber);}
.tip-box-label.waarschuwing{color:#ef4444;}
.tip-box p{margin:0;font-size:0.9rem;}
.vergelijk-tabel{width:100%;border-collapse:separate;border-spacing:0;margin:1.25rem 0;border:1px solid var(--peach);border-radius:var(--radius);overflow:hidden;}
.vergelijk-tabel th{background:var(--fg);color:var(--gold);font-family:var(--font-h);font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;padding:0.75rem 1rem;text-align:left;}
.vergelijk-tabel td{padding:0.75rem 1rem;font-size:0.9rem;border-top:1px solid var(--cream);}
.vergelijk-tabel tr:nth-child(even) td{background:rgba(247,230,194,0.3);}
.drag-items{display:flex;flex-wrap:wrap;gap:0.6rem;margin-bottom:1.5rem;padding:0.75rem;border:2px dashed var(--peach);border-radius:var(--radius);min-height:56px;}
.drag-item{background:var(--fg);color:var(--bg);padding:0.5rem 1rem;border-radius:var(--radius-pill);cursor:grab;font-size:0.9rem;font-weight:600;user-select:none;touch-action:none;}
.drag-item:active{cursor:grabbing;opacity:0.7;}
.drop-zones{display:flex;flex-direction:column;gap:0.75rem;}
.drop-zone{border:2px dashed var(--peach);border-radius:var(--radius);padding:0.75rem 1rem;min-height:64px;transition:all 0.2s;}
.drop-zone.drag-over{border-color:var(--amber);background:rgba(255,133,20,0.08);}
.drop-zone-label{font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber);margin-bottom:0.5rem;}
.sorteer-lijst{display:flex;flex-direction:column;gap:0.5rem;margin:1.25rem 0;min-height:60px;}
.sorteer-item{background:var(--fg);color:var(--bg);padding:0.65rem 1rem;border-radius:8px;cursor:grab;font-size:0.9rem;font-weight:600;user-select:none;touch-action:none;display:flex;align-items:center;gap:0.75rem;}
.sorteer-nummer{width:24px;height:24px;border-radius:50%;background:rgba(255,248,242,0.15);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;flex-shrink:0;}
.scenario-blok{background:var(--cream);border-radius:var(--radius);padding:1.5rem;margin:1.25rem 0;border:1px solid var(--peach);}
.scenario-label{font-family:var(--font-h);font-weight:700;font-size:0.8rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--amber);margin-bottom:0.5rem;}
.scenario-tekst{font-size:0.95rem;margin-bottom:1.25rem;}
.scenario-keuzes{display:flex;flex-direction:column;gap:0.5rem;}
.scenario-keuze{background:var(--bg);border:2px solid var(--peach);border-radius:8px;padding:0.75rem 1rem;cursor:pointer;font-family:var(--font-b);font-size:0.9rem;text-align:left;transition:all 0.2s;}
.scenario-keuze:hover{border-color:var(--amber);}
.scenario-feedback{margin-top:0.75rem;padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;display:none;}
.annotatie-figuur{position:relative;background:var(--cream);border-radius:var(--radius);padding:1.5rem;border:1px solid var(--peach);min-height:200px;}
.annotatie-punt{position:absolute;width:28px;height:28px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:0.75rem;font-weight:700;color:white;cursor:pointer;transition:transform 0.2s;z-index:10;}
.annotatie-punt:hover{transform:scale(1.2);}
.annotatie-uitleg{display:flex;flex-direction:column;gap:0.75rem;margin-top:1rem;}
.annotatie-item{display:flex;gap:0.75rem;align-items:flex-start;}
.annotatie-nr{flex-shrink:0;width:24px;height:24px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:0.7rem;font-weight:700;color:white;}
.annotatie-tekst{font-size:0.9rem;}
.tijdlijn{position:relative;margin:1.5rem 0;padding-left:2rem;}
.tijdlijn::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:3px;background:var(--gradient);border-radius:2px;}
.tijdlijn-punt{position:relative;margin-bottom:1.5rem;padding-left:1.5rem;}
.tijdlijn-punt::before{content:'';position:absolute;left:-2rem;top:4px;width:14px;height:14px;background:var(--amber);border:3px solid var(--bg);border-radius:50%;z-index:1;}
.tijdlijn-punt h4{font-family:var(--font-h);font-size:0.95rem;margin:0 0 0.25rem;}
.tijdlijn-punt p{margin:0;font-size:0.85rem;color:rgba(39,41,45,0.8);}
.processtroom{display:flex;flex-wrap:wrap;gap:0;align-items:center;margin:1.25rem 0;justify-content:center;}
.proces-blok{background:var(--fg);color:var(--bg);border-radius:var(--radius);padding:1rem 1.25rem;min-width:120px;text-align:center;flex:0 1 auto;}
.proces-blok h4{font-family:var(--font-h);font-size:0.85rem;color:var(--gold);margin:0 0 0.25rem;}
.proces-blok p{margin:0;font-size:0.8rem;color:rgba(255,248,242,0.8);}
.proces-pijl{font-size:1.5rem;color:var(--amber);padding:0 0.5rem;font-weight:700;flex-shrink:0;}
.lees-meer-content{display:none;margin-top:0.75rem;}
.lees-meer-content.open{display:block;}
.lees-meer-btn{background:none;border:none;color:var(--amber);font-family:var(--font-b);font-weight:600;font-size:0.9rem;cursor:pointer;padding:0;text-decoration:underline;}
.quiz-header{background:var(--gradient);border-radius:var(--radius);padding:1.25rem 1.5rem;margin-bottom:1.5rem;color:var(--bg);}
.quiz-header h2{font-family:var(--font-h);font-size:1.4rem;margin:0;}
.quiz-voortgang{font-size:0.8rem;color:var(--amber);font-weight:600;margin-bottom:0.75rem;}
.quiz-vraag-tekst{font-family:var(--font-h);font-size:1.1rem;margin-bottom:1.25rem;}
.quiz-opties{display:flex;flex-direction:column;gap:0.6rem;}
.quiz-optie{background:var(--bg);border:2px solid var(--peach);border-radius:8px;padding:0.85rem 1.1rem;cursor:pointer;font-family:var(--font-b);font-size:0.95rem;text-align:left;transition:all 0.2s;}
.quiz-optie:hover{border-color:var(--amber);background:rgba(255,133,20,0.06);}
.quiz-feedback{margin-top:1rem;padding:0.75rem 1rem;border-radius:8px;font-size:0.9rem;display:none;}
.quiz-feedback.correct{display:block;color:#16a34a;background:rgba(34,197,94,0.12);border:1px solid #22c55e;}
.quiz-feedback.fout{display:block;color:#dc2626;background:rgba(239,68,68,0.12);border:1px solid #ef4444;}
.resultaat-hero{background:var(--fg);color:var(--bg);border-radius:var(--radius);padding:2.5rem;text-align:center;margin-bottom:1.5rem;position:relative;overflow:hidden;}
.resultaat-hero::before{content:'';position:absolute;bottom:-60px;right:-60px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,133,20,0.3) 0%,transparent 70%);border-radius:50%;}
.score-cirkel{width:100px;height:100px;background:var(--gradient);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-family:var(--font-h);font-size:1.8rem;font-weight:700;color:var(--bg);}
.certificaat{background:var(--bg);border:2px solid var(--peach);border-radius:var(--radius);padding:2rem;text-align:center;margin-bottom:1.5rem;}
.certificaat-title{font-family:var(--font-h);font-size:1rem;color:var(--amber);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:1rem;}
.certificaat h2{font-family:var(--font-h);font-size:1.4rem;margin-bottom:0.5rem;}
.certificaat-datum{font-size:0.85rem;color:rgba(39,41,45,0.6);margin-top:0.5rem;}
@media print{body>*:not(#screen-result){display:none!important;}.module-header,.nav-btn,.btn-wrap,.voortgangsbalk{display:none!important;}#certificaat-blok{display:block!important;border:2px solid #EAE6E0;}.btn-print{display:none!important;}}
footer{background:var(--fg);color:rgba(255,248,242,0.7);text-align:center;padding:1.5rem;font-size:0.8rem;margin-top:3rem;}
footer strong{color:var(--gold);}
footer a{color:var(--peach);}
@media(max-width:600px){
  .welcome-hero h1{font-size:1.6rem;}
  .screen{padding:0 1rem 3rem;}
  .btn-wrap{flex-direction:column;}
  .btn{text-align:center;}
  .flashcard-set,.processtroom{flex-direction:column;}
  .proces-pijl{transform:rotate(90deg);}
  .stap-item{flex-direction:column;}
}
</style>
</head>
<body>
 
<header>
  <div class="header-inner">
    <a class="logo" href="#"><img src="/logo.png" alt="Umely" style="height:40px;object-fit:contain;filter:brightness(0) invert(1);"></a>
    <span class="header-title" id="header-module-title"></span>

// NIET AANPASSEN
function goTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  const t=document.getElementById(id);
  if(t){t.style.display='block';window.scrollTo(0,0);}
  updateProgress(id);
  const el=document.getElementById('header-module-title');
  if(el&&MODULE_TITELS[id]!==undefined)el.textContent=MODULE_TITELS[id];
}
function goBack(){
  const h=[...document.querySelectorAll('.screen')].find(s=>s.style.display==='block');
  if(!h)return;const i=SCHERMEN.indexOf(h.id);if(i>0)goTo(SCHERMEN[i-1]);
}
function updateProgress(id){
  const i=SCHERMEN.indexOf(id),p=i<0?100:Math.round((i/(SCHERMEN.length-1))*100);
  document.getElementById('progressBar').style.width=p+'%';
  document.getElementById('progressLabel').textContent=p+'% voltooid';
}
const _btn='background:linear-gradient(90deg,#FF8514,#FF4D00);color:white;border:none;border-radius:50px;padding:10px 20px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif;font-size:0.9rem;';
function checkKC(nr,el,ok,next,uitleg){
  document.querySelectorAll('#kc-'+nr+' .kc-optie').forEach(o=>o.style.pointerEvents='none');
  el.classList.add(ok?'correct':'fout');
  const fb=document.getElementById('kc-feedback-'+nr);
  const vk='<button style="'+_btn+'" onclick="goTo(\''+next+'\')">Volgende</button>';
  fb.className='kc-feedback '+(ok?'correct':'fout');
  fb.innerHTML=(ok?'<strong>Correct!</strong> ':'<strong>Niet correct.</strong> ')+uitleg
    +'<div class="kc-knoppen">'+(ok?'':'<button style="'+_btn+'background:#27292D;" onclick="resetKC('+nr+')">Probeer opnieuw</button>')+vk+'</div>';
}
function resetKC(nr){
  document.querySelectorAll('#kc-'+nr+' .kc-optie').forEach(o=>{o.style.pointerEvents='';o.classList.remove('correct','fout');});
  const fb=document.getElementById('kc-feedback-'+nr);fb.className='kc-feedback';fb.innerHTML='';
}
function toggleFlashcard(el){el.classList.toggle('open');}
function checkInvul(iId,correct,fId){
  const inp=document.getElementById(iId),fb=document.getElementById(fId),v=inp.value.trim().toLowerCase(),c=correct.toLowerCase();
  if(v===c||v.includes(c)||c.includes(v)){inp.className='invul-input correct-input';fb.textContent='Correct!';fb.style.color='#16a34a';}
  else{inp.className='invul-input fout-input';fb.textContent='Het juiste antwoord is: '+correct;fb.style.color='#dc2626';}
}
function togglePopup(id){
  document.querySelectorAll('.diagram-popup').forEach(p=>{if(p.id!==id)p.classList.remove('zichtbaar');});
  document.getElementById(id)?.classList.toggle('zichtbaar');
}
function toggleLeesMeer(btn,id){
  const c=document.getElementById(id);c?.classList.toggle('open');btn.textContent=c?.classList.contains('open')?'Lees minder':'Lees meer';
}
function checkScenario(nr,el,ok,uitleg){
  document.querySelectorAll('#scenario-'+nr+' .scenario-keuze').forEach(o=>o.style.pointerEvents='none');
  el.classList.add(ok?'correct':'fout');
  const fb=document.getElementById('scenario-feedback-'+nr);
  fb.className='scenario-feedback '+(ok?'correct':'fout');
  fb.innerHTML=(ok?'<strong>Goede keuze!</strong> ':'<strong>Niet de beste keuze.</strong> ')+uitleg;
  fb.style.display='block';
}
function highlightAnnotatie(nr){
  document.querySelectorAll('.annotatie-item').forEach(i=>{
    const a=i.dataset.nr===String(nr);
    i.style.background=a?'rgba(255,133,20,0.1)':'transparent';
    i.style.borderRadius='8px';i.style.padding=a?'0.5rem':'0';
  });
}
let gesleeptItem=null;
function dragStart(e,el){gesleeptItem=el;e.dataTransfer?.setData('text/plain',el.dataset.id);}
function dragOver(e,z){e.preventDefault();z.classList.add('drag-over');}
function dragLeave(z){z.classList.remove('drag-over');}
function drop(e,z,cId){
  e.preventDefault();z.classList.remove('drag-over');
  if(!gesleeptItem)return;
  z.appendChild(gesleeptItem);z.classList.add(gesleeptItem.dataset.id===cId?'correct':'fout');gesleeptItem=null;
}
function resetDragDrop(){
  const b=document.getElementById('drag-bron');if(!b)return;
  document.querySelectorAll('.drag-item').forEach(i=>b.appendChild(i));
  document.querySelectorAll('.drop-zone').forEach(z=>z.classList.remove('correct','fout','drag-over'));
}
document.addEventListener('touchstart',e=>{if(e.target.classList.contains('drag-item'))gesleeptItem=e.target;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!gesleeptItem)return;
  const t=e.changedTouches[0],el=document.elementFromPoint(t.clientX,t.clientY),z=el?.closest('.drop-zone');
  if(z){z.appendChild(gesleeptItem);z.classList.add(gesleeptItem.dataset.id===z.dataset.correct?'correct':'fout');}
  gesleeptItem=null;
});
let gesorteerBron=null;
function sorteerDragStart(e,el){gesorteerBron=el;e.dataTransfer?.setData('text/plain',el.dataset.positie);}
function sorteerDragOver(e,el){e.preventDefault();el.style.borderColor='var(--amber)';}
function sorteerDragLeave(el){el.style.borderColor='transparent';}
function sorteerDrop(e,el){
  e.preventDefault();el.style.borderColor='transparent';
  if(!gesorteerBron||gesorteerBron===el)return;
  const l=el.parentNode,it=[...l.children],vi=it.indexOf(gesorteerBron),ni=it.indexOf(el);
  if(vi<ni)l.insertBefore(gesorteerBron,el.nextSibling);else l.insertBefore(gesorteerBron,el);
  gesorteerBron=null;
}
function checkSorteer(lId,correct,fId){
  const l=document.getElementById(lId),it=[...l.querySelectorAll('.sorteer-item')];
  const ok=it.map(i=>i.dataset.positie).join(',')===correct.join(',');
  const fb=document.getElementById(fId);
  if(ok){fb.textContent='Correct! Dit is de juiste volgorde.';fb.style.color='#16a34a';it.forEach(i=>i.style.borderLeft='3px solid #22c55e');}
  else{fb.textContent='Nog niet helemaal goed.';fb.style.color='#dc2626';it.forEach(i=>i.style.borderLeft='3px solid #ef4444');}
}
let quizScore=0,quizHuidig=0;
function laadQuizVraag(){
  if(quizHuidig>=quizVragen.length){toonResultaat();return;}
  const v=quizVragen[quizHuidig];
  document.getElementById('quiz-voortgang').textContent='Vraag '+(quizHuidig+1)+' van '+quizVragen.length;
  document.getElementById('quiz-vraag-tekst').textContent=v.vraag;
  const el=document.getElementById('quiz-opties');el.innerHTML='';
  v.opties.forEach((o,i)=>{const b=document.createElement('button');b.className='quiz-optie';b.textContent=o;b.onclick=()=>beantwoordQuiz(i,b);el.appendChild(b);});
  document.getElementById('quiz-feedback').className='quiz-feedback';
  document.getElementById('quiz-volgende-btn').style.display='none';
}
function beantwoordQuiz(g,btn){
  document.querySelectorAll('.quiz-optie').forEach(o=>o.style.pointerEvents='none');
  const v=quizVragen[quizHuidig],ok=g===v.correct;
  btn.classList.add(ok?'correct':'fout');
  document.querySelectorAll('.quiz-optie')[v.correct].classList.add('correct');
  if(ok)quizScore++;
  const fb=document.getElementById('quiz-feedback');
  fb.className='quiz-feedback '+(ok?'correct':'fout');
  fb.textContent=(ok?'Correct! ':'Niet helemaal. ')+v.uitleg;
  const vb=document.getElementById('quiz-volgende-btn');
  vb.style.display='inline-block';vb.textContent=quizHuidig<quizVragen.length-1?'Volgende vraag':'Bekijk resultaat';
}
function volgendeQuizVraag(){quizHuidig++;laadQuizVraag();}
function toonResultaat(){
  goTo('screen-result');
  const pct=Math.round((quizScore/quizVragen.length)*100);
  document.getElementById('score-display').textContent=pct+'%';
  document.getElementById('resultaat-boodschap').textContent=pct>=70?'Gefeliciteerd! Je hebt de training succesvol afgerond.':'Je score is '+pct+'%. Probeer het nog eens!';
  if(pct>=70){
    document.getElementById('certificaat-blok').style.display='block';
    document.getElementById('cert-datum').textContent='Behaald op '+new Date().toLocaleDateString('nl-NL',{day:'numeric',month:'long',year:'numeric'});
  }
  slaVoortgangOp(true,pct);
}
function slaVoortgangOp(c,s){
  const slug=location.pathname.split('/modules/')[1];if(!slug)return;
  const h={'Content-Type':'application/json'};
  if(window.__AUTH_TOKEN__)h['Authorization']='Bearer '+window.__AUTH_TOKEN__;
  fetch('/api/user/progress',{method:'POST',headers:h,body:JSON.stringify({module_slug:slug,completed:!!c,score_pct:s||0})}).catch(()=>{});
}
function herstart(){
  quizScore=0;quizHuidig=0;
  if(document.getElementById('drag-bron'))resetDragDrop();
  laadQuizVraag();goTo('screen-welcome');
}
document.addEventListener('DOMContentLoaded',()=>{goTo('screen-welcome');laadQuizVraag();});
</script>
