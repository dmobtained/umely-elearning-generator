<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#27292D"/>
  <!-- Brain left half -->
  <g transform="translate(256,256)" fill="none" stroke="#FF8514" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left brain lobe -->
    <path d="M-10,-90 C-60,-90 -110,-60 -115,-10 C-120,30 -100,55 -80,65 C-90,80 -85,105 -65,110 C-55,125 -30,125 -15,110 C-10,125 10,130 20,115 L20,-80 C10,-88 0,-90 -10,-90 Z"/>
    <!-- Right brain lobe -->
    <path d="M10,-90 C60,-90 110,-60 115,-10 C120,30 100,55 80,65 C90,80 85,105 65,110 C55,125 30,125 15,110 C10,125 -10,130 -20,115 L-20,-80 C-10,-88 0,-90 10,-90 Z"/>
    <!-- Center line -->
    <line x1="0" y1="-85" x2="0" y2="115"/>
    <!-- Brain folds left -->
    <path d="M-30,-50 C-60,-45 -70,-20 -55,-10"/>
    <path d="M-25,10 C-65,15 -75,45 -55,55"/>
    <path d="M-20,65 C-50,65 -60,85 -45,95"/>
    <!-- Brain folds right -->
    <path d="M30,-50 C60,-45 70,-20 55,-10"/>
    <path d="M25,10 C65,15 75,45 55,55"/>
    <path d="M20,65 C50,65 60,85 45,95"/>
    <!-- Plug -->
    <line x1="0" y1="115" x2="0" y2="145"/>
    <line x1="-18" y1="130" x2="-18" y2="155"/>
    <line x1="18" y1="130" x2="18" y2="155"/>
  </g>
</svg>
